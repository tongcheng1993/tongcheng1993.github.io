<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK版本下载 - Vue3列表</title>
    <script src="https://unpkg.com/vue@3.5.33/dist/vue.global.js"></script>
    <style>
        /* 简单 CSS 样式，提升视觉体验 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        }

        h3 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
        }

        .sub {
            color: #5b6e8c;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            padding-left: 1rem;
        }

        ul {
            list-style: none;
            margin: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        li {
            background: #f8fafc;
            border-radius: 16px;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        li:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        a {
            display: block;
            padding: 0.9rem 1.2rem;
            text-decoration: none;
            font-weight: 500;
            color: #1e40af;
            font-size: 1rem;
            transition: 0.2s;
            border-radius: 16px;
        }

        a:hover {
            color: #1d4ed8;
            background: #ffffff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        .path-hint {
            font-size: 0.75rem;
            color: #5b6e8c;
            font-family: monospace;
            margin-top: 4px;
            display: inline-block;
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* 为每个链接里的文件路径做点缀 */
        .version-name {
            font-weight: 600;
            margin-right: 12px;
        }

        .footer-note {
            margin-top: 1.8rem;
            padding-top: 1rem;
            border-top: 1px solid #e9edf2;
            font-size: 0.8rem;
            color: #6c7a91;
            text-align: center;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1.2rem;
            }

            a {
                padding: 0.7rem 1rem;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="app-container">
            <h3>📦 APK 版本选择</h3>
            <div class="sub">点击链接直接下载安装包</div>
            <ul>
                <li v-for="item in list" :key="item.version">
                    <a :href="item.path" download>
                        <span class="version-name">{{ item.name }}</span>
                        <span class="path-hint">{{ item.path }}</span>
                    </a>
                </li>
            </ul>
            <div class="footer-note">
                💡 提示：若浏览器未自动下载，可右键链接选择“另存为”
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    list: [
                        { version: 1, name: '1', path: '/1/app-release.apk' },
                    ]
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
